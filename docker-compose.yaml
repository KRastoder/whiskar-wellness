version: "3.9"

services:
  wiskerscare-db:
    image: postgres:16
    container_name: wiskersCare
    restart: always
    environment:
      POSTGRES_DB: wiskersCare
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5435:5432"  
    volumes:
      - wiskerscare_data:/var/lib/postgresql/data

volumes:
  wiskerscare_data:
